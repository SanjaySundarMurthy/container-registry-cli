# Full Registry Manifest Example
# Comprehensive example demonstrating all supported fields

images:
  # Production backend service
  - repository: myorg/backend-api
    tags:
      - name: v2.5.0
        digest: sha256:a1b2c3d4e5f6
        created_at: "2026-03-01T10:00:00"  # ISO 8601 format
        size_bytes: 157286400  # 150 MB
        architecture: amd64
        os: linux

      - name: v2.4.0
        digest: sha256:f6e5d4c3b2a1
        created_at: 45  # days ago (integer format)
        size_bytes: 152043520
        status: active

      - name: latest
        digest: sha256:a1b2c3d4e5f6
        created_at: 1
        size_bytes: 157286400

      - name: dev-feature-auth
        digest: sha256:dev12345
        created_at: 60
        size_bytes: 167772160

      - name: v1.0.0
        digest: sha256:old123456
        created_at: 400
        size_bytes: 125829120
        status: stale

    vulnerabilities:
      - cve_id: CVE-2026-1234
        severity: critical
        package: openssl
        installed_version: 1.1.1k
        fixed_version: 1.1.1w
        description: Buffer overflow in OpenSSL

      - cve_id: CVE-2026-5678
        severity: high
        package: curl
        installed_version: 7.68.0
        fixed_version: 7.88.1

      - cve_id: CVE-2026-9012
        severity: medium
        package: zlib
        installed_version: 1.2.11
        # No fixed_version = not fixable

    layers:
      - digest: sha256:layer1
        size_bytes: 52428800
        command: "FROM ubuntu:22.04"
      - digest: sha256:layer2
        size_bytes: 31457280
        command: "RUN apt-get update && apt-get install -y python3"
      - digest: sha256:layer3
        size_bytes: 73400320
        command: "COPY . /app"

    labels:
      environment: production
      team: backend
      user: appuser  # Non-root user (passes REG-005)
      maintainer: team-backend@myorg.com

  # Frontend service (clean image)
  - repository: myorg/frontend
    tags:
      - name: v3.0.0
        digest: sha256:fe12345
        created_at: 5
        size_bytes: 52428800

      - name: v2.9.0
        digest: sha256:fe09876
        created_at: 30
        size_bytes: 48234496

    vulnerabilities: []  # No vulnerabilities

    labels:
      team: frontend
      user: nginx
      scanned: "true"

  # Worker service with critical issues
  - repository: myorg/worker
    tags:
      - name: v1.0.0
        digest: sha256:wkr001
        created_at: 250
        size_bytes: 629145600  # 600 MB (exceeds size threshold)
        status: stale

    vulnerabilities:
      - cve_id: CVE-2025-4567
        severity: critical
        package: log4j
        installed_version: 2.14.0
        fixed_version: 2.17.1

      - cve_id: CVE-2025-7890
        severity: critical
        package: openssl
        installed_version: 1.0.2
        fixed_version: 3.0.8

    labels:
      status: deprecated
      environment: production
      # No 'user' label = runs as root (triggers REG-005)

  # Cache service
  - repository: myorg/redis-cache
    tags:
      - name: "7.2"
        digest: sha256:redis01
        created_at: 15
        size_bytes: 31457280

    vulnerabilities: []

    labels:
      team: infra
      user: redis
      scanned: "true"
