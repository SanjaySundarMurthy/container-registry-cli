# ============================================================================
# Shell Script Example
# ============================================================================
# Save as: scripts/weekly-audit.sh

#!/bin/bash
# Weekly registry audit script

set -e

MANIFEST_FILE="${1:-registry-manifest.yaml}"
POLICY_FILE="${2:-cleanup-policy.yaml}"
OUTPUT_DIR="${3:-reports}"

mkdir -p "$OUTPUT_DIR"
DATE=$(date +%Y-%m-%d)

echo "=== Container Registry Audit: $DATE ==="

# Generate full scan report
container-registry-cli scan "$MANIFEST_FILE" --format json -o "$OUTPUT_DIR/scan-$DATE.json"
echo "✓ Scan report: $OUTPUT_DIR/scan-$DATE.json"

# Generate HTML report for stakeholders
container-registry-cli scan "$MANIFEST_FILE" --format html -o "$OUTPUT_DIR/scan-$DATE.html"
echo "✓ HTML report: $OUTPUT_DIR/scan-$DATE.html"

# Cleanup analysis
container-registry-cli cleanup "$MANIFEST_FILE" -p "$POLICY_FILE" --format json > "$OUTPUT_DIR/cleanup-$DATE.json"
echo "✓ Cleanup report: $OUTPUT_DIR/cleanup-$DATE.json"

# Security audit with exit code for CI
container-registry-cli audit "$MANIFEST_FILE" --fail-on high --format json > "$OUTPUT_DIR/audit-$DATE.json"
echo "✓ Security audit passed!"
